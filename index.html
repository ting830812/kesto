<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kesto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div id="custom-level-banner" class="custom-banner hidden">
            <span data-i18n="banner_custom"></span>
            <a id="link-back-to-creator" href="creator.html" class="banner-link" data-i18n="banner_back"></a>
        </div>

        <header class="game-header">
            <div class="header-actions">
                <div class="top-nav">
                    <a href="creator.html" class="nav-link" data-i18n="nav_creator">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    </a>
                </div>
                <div class="lang-selector-container">
                    <select id="lang-select" class="lang-select">
                        <option value="zh">繁體中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>
            </div>
            <h1 data-i18n="title"></h1>
            <p class="subtitle" data-i18n="subtitle"></p>
        </header>

        <div class="game-stats">
            <div class="stat-box">
                <span class="stat-label" data-i18n="stat_moves"></span>
                <span id="move-count" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label" data-i18n="stat_target"></span>
                <span id="coverage-count" class="stat-value">0 / 8</span>
            </div>
        </div>

        <div class="board-wrapper">
            <div id="game-board" class="game-board">
                <!-- Grid cells will be dynamically generated here -->
                <!-- Yellow blocks will be rendered on top for smooth animations -->
            </div>
        </div>

        <div class="controls-container">
            <button id="btn-undo" class="btn btn-secondary" data-i18n="btn_undo" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            </button>
            <button id="btn-reset" class="btn btn-primary" data-i18n="btn_reset">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 3h5v5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21H3v-5"/></svg>
            </button>
        </div>

        <footer class="game-footer">
            <p data-i18n="footer"></p>
            <p class="source-credit">
                <span data-i18n="source_attribution"></span>
                <a href="https://playground.tw/kesto" target="_blank" rel="noopener noreferrer" class="source-link">Kesto</a>
            </p>
        </footer>
    </div>

    <!-- Victory Modal -->
    <div id="victory-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="victory-icon">🎉</div>
            <h2 data-i18n="victory_title"></h2>
            <p id="victory-text"></p>
            <button id="btn-play-again" class="btn btn-primary btn-lg" data-i18n="btn_play_again"></button>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="game.js"></script>
</body>
</html>
